<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 989 348" width="989" height="348">
<rect width="989" height="348" rx="10" ry="10" fill="#f7f7f7" stroke="#d0d0d0" stroke-width="2"/>
<text x="24" y="43.55" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">BASIC:</text>
<text x="24" y="76.9" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  agent                  Start interactive session</text>
<text x="24" y="110.25" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  agent &quot;prompt&quot;         One-shot command</text>
<text x="24" y="143.6" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  agent --mode=ask       Read-only mode</text>
<text x="24" y="176.95" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  agent --mode=plan      Plan before code</text>
<text x="24" y="210.29999999999998" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  agent --model &lt;name&gt;   Specify model</text>
<text x="24" y="243.64999999999998" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">IN SESSION:  /model  /compress  /rules  /commands  /resume  /usage</text>
<text x="24" y="277.0" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">CLOUD:  &amp; &quot;message&quot;  →  cursor.com/agents</text>
<text x="24" y="310.35" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">KEYS:  Shift+Enter (new line)  |  Ctrl+D twice (exit)</text>
</svg>