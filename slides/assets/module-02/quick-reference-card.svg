<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1003 314" width="1003" height="314">
<rect width="1003" height="314" rx="10" ry="10" fill="#f7f7f7" stroke="#d0d0d0" stroke-width="2"/>
<text x="24" y="43.55" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">SHORTCUTS:</text>
<text x="24" y="76.9" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  Cmd/Ctrl + I        → Open Agent</text>
<text x="24" y="110.25" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  Cmd/Ctrl + L        → Explain selected code</text>
<text x="24" y="143.6" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  Shift + Tab         → Toggle Plan Mode</text>
<text x="24" y="176.95" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  Cmd/Ctrl + Shift + S → Create checkpoint</text>
<text x="24" y="210.29999999999998" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">@MENTIONS:  @filename  @symbol  @branch  @chat  @web</text>
<text x="24" y="243.64999999999998" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">SAFE CHANGE: Ask → Review diff → Accept/reject → Test</text>
<text x="24" y="277.0" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">PLAN MODE:   Shift+Tab → Describe → Review plan → Approve → Execute</text>
</svg>