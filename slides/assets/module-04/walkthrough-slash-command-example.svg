<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 946 214" width="946" height="214">
<rect width="946" height="214" rx="10" ry="10" fill="#f7f7f7" stroke="#d0d0d0" stroke-width="2"/>
<text x="24" y="43.55" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">name: deploy | argument: environment (staging | production)</text>
<text x="24" y="76.9" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">Pre-deploy: make test → make lint → git status clean</text>
<text x="24" y="110.25" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">Deploy staging: git push origin main → kubectl set image</text>
<text x="24" y="143.6" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">Deploy production: git tag → deploy-prod.sh (requires approval)</text>
<text x="24" y="176.95" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">Post-deploy: healthcheck → smoke tests → slack notify</text>
</svg>