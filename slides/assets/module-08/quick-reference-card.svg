<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 348" width="1060" height="348">
<rect width="1060" height="348" rx="10" ry="10" fill="#f7f7f7" stroke="#d0d0d0" stroke-width="2"/>
<text x="24" y="43.55" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">ENDPOINTS:</text>
<text x="24" y="76.9" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  POST /v1/agents                         Create agent</text>
<text x="24" y="110.25" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  GET  /v1/agents/{id}                    Get status</text>
<text x="24" y="143.6" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  GET  /v1/agents/{id}/runs/{id}/stream   SSE stream</text>
<text x="24" y="176.95" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  GET  /v1/agents/{id}/artifacts          List artifacts</text>
<text x="24" y="210.29999999999998" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">  GET  /v1/agents/{id}/artifacts/download Download</text>
<text x="24" y="243.64999999999998" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">WEBHOOK:  X-Webhook-Signature (HMAC-SHA256)  |  X-Webhook-Event</text>
<text x="24" y="277.0" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">SSE:  status · assistant · thinking · tool_call · result · error · done</text>
<text x="24" y="310.35" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="23.00" fill="#1a1a1a">NGROK:  ngrok http 5000  |  inspect at http://127.0.0.1:4040</text>
</svg>