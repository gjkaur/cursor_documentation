<header>Cursor Training Program — Complete Course</header>
<h2 id="why-outputs-are-probabilistic">Why Outputs Are Probabilistic</h2>
<blockquote>
<p>Unlike traditional software that gives the same output for the same input, AI models generate responses based on <strong>probability distributions</strong>.</p>
</blockquote>
<p>At its simplest, an LLM is a <strong>next-token prediction engine</strong>.</p>
<p>Given a sequence of tokens, it predicts what comes next — then samples, appends, repeats.</p>
</section>

<h2 id="traditional-code-vs-ai-model">Traditional Code vs. AI Model</h2>
<table>
<thead>
<tr>
<th>Traditional Code</th>
<th>AI Model</th>
</tr>
</thead>
<tbody>
<tr>
<td>Deterministic (same input → same output)</td>
<td>Probabilistic (different outputs possible)</td>
</tr>
<tr>
<td>You control the logic</td>
<td>You influence, but don't control</td>
</tr>
<tr>
<td>Errors are bugs</td>
<td>Errors are features of probability</td>
</tr>
<tr>
<td>Predictable behavior</td>
<td>Needs management via parameters</td>
</tr>
</tbody>
</table>
</section>

<h2 id="temperature-impact">Temperature Impact</h2>
<p>Same prompt: <em>&quot;Write a function to reverse a string&quot;</em></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Temperature 0.1 — very deterministic</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">reverse_string</span>(<span class="hljs-params">s</span>):
    <span class="hljs-keyword">return</span> s[::-<span class="hljs-number">1</span>]

<span class="hljs-comment"># Temperature 0.7 — balanced (adds edge cases)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">reverse_string</span>(<span class="hljs-params">s</span>):
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> s: <span class="hljs-keyword">return</span> s
    <span class="hljs-keyword">return</span> s[::-<span class="hljs-number">1</span>]

<span class="hljs-comment"># Temperature 1.2 — creative, potentially unstable</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">flip_the_text</span>(<span class="hljs-params">text</span>): ...
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-theme="flat-gaia" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--header:Cursor Training Program — Complete Course;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>
<h2 id="the-training-gap">The Training Gap</h2>
<p>Models are frozen at their training cutoff date. They don't know:</p>
<ul>
<li>Code written after their training date</li>
<li>Your company's internal APIs</li>
<li>Your specific architecture decisions</li>
<li>Recent library updates (unless in context)</li>
</ul>
<p><strong>Implication:</strong> You must provide this information in the prompt or context.</p>
</section>

<header>Cursor Training Program — Complete Course</header>
<h2 id="what-are-hallucinations">What Are Hallucinations?</h2>
<blockquote>
<p>Confident-sounding outputs that are <strong>factually wrong</strong>, made up, or don't exist.</p>
</blockquote>
<p>Most dangerous form: the model sounds <strong>completely confident</strong> while being <strong>completely wrong</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-md" data-theme="flat-gaia" lang="en-US" class="fit-md" data-marpit-pagination="20" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-md;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="hallucinations-in-code">Hallucinations in Code</h2>
<table>
<thead>
<tr>
<th>Type</th>
<th>Example</th>
<th>How to Spot</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Fake APIs</strong></td>
<td><code>import nonexistent_library</code></td>
<td>Check docs; import fails</td>
</tr>
<tr>
<td><strong>Wrong parameters</strong></td>
<td>Incorrect function signature</td>
<td>Type checking</td>
</tr>
<tr>
<td><strong>Invented methods</strong></td>
<td><code>list.reverse_in_place()</code></td>
<td>Know the standard library</td>
</tr>
<tr>
<td><strong>Confident nonsense</strong></td>
<td>&quot;This is the standard way to…&quot;</td>
<td>Cross-reference</td>
</tr>
<tr>
<td><strong>Outdated syntax</strong></td>
<td>Old Python 2 style</td>
<td>Know version differences</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-sm" data-theme="flat-gaia" lang="en-US" class="fit-sm" data-marpit-pagination="21" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-sm;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="why-models-hallucinate">Why Models Hallucinate</h2>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-xs" data-theme="flat-gaia" lang="en-US" class="fit-xs" data-marpit-pagination="22" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-xs;--theme:flat-gaia;" data-marpit-pagination-total="431">

<h2 id="example-confident-wrong">Example: Confident Wrong</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">User: <span class="hljs-string">&quot;How do I use requests for async calls?&quot;</span>

<span class="hljs-comment"># Hallucinated (confident, wrong)</span>
<span class="hljs-keyword">import</span> requests.<span class="hljs-keyword">async</span> <span class="hljs-keyword">as</span> async_requests
response = <span class="hljs-keyword">await</span> async_requests.get(<span class="hljs-string">&#x27;https://api.example.com&#x27;</span>)

<span class="hljs-comment"># Reality: requests does NOT have async support.</span>
<span class="hljs-comment"># Correct answer: Use httpx or aiohttp</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-sm" data-theme="flat-gaia" lang="en-US" class="fit-sm" data-marpit-pagination="23" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-sm;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="hallucination-mitigation-strategies">Hallucination Mitigation Strategies</h2>
<table>
<thead>
<tr>
<th>Strategy</th>
<th>How It Works</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Grounding</strong></td>
<td>Provide source material</td>
<td>Paste library docs into context</td>
</tr>
<tr>
<td><strong>Verification</strong></td>
<td>Ask for citations</td>
<td>&quot;Which line of the docs shows this?&quot;</td>
</tr>
<tr>
<td><strong>Constrained decoding</strong></td>
<td>Limit possible outputs</td>
<td>JSON mode, regex patterns</td>
</tr>
<tr>
<td><strong>Self-consistency</strong></td>
<td>Ask multiple times, compare</td>
<td>Run same prompt 3×, take majority</td>
</tr>
<tr>
<td><strong>Low temperature</strong></td>
<td>Reduce randomness</td>
<td><code>temperature: 0.1</code></td>
</tr>
<tr>
<td><strong>Tool use</strong></td>
<td>Let model search/lookup</td>
<td>Enable web search for docs</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-theme="flat-gaia" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--header:Cursor Training Program — Complete Course;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>
<h2 id="hallucination-detection-checklist">Hallucination Detection Checklist</h2>
<p>Before accepting AI-generated code, verify:</p>
<ul>
<li>Do the imported libraries exist?</li>
<li>Are function signatures correct?</li>
<li>Does the syntax match my language version?</li>
<li>Are there obvious logic errors?</li>
<li>Would this code actually run?</li>
<li>Does the model cite sources you can verify?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-theme="flat-gaia" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--header:Cursor Training Program — Complete Course;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>
<h2 id="the-developers-mindset">The Developer's Mindset</h2>
<blockquote>
<p><em>&quot;Trust, but verify – especially when the AI sounds most confident.&quot;</em></p>
</blockquote>
<ul>
<li>Hallucinations decrease with better prompts and context</li>
<li>They never fully disappear</li>
<li>You are the human-in-the-loop responsible for verification</li>
<li>Experience helps you &quot;smell&quot; potential hallucinations</li>
</ul>
</section>

<header>Cursor Training Program — Complete Course</header>

<h1 id="lesson-13">Lesson 1.3</h1>
<h2 id="tokens-and-pricing">Tokens and Pricing</h2>

<h2 id="why-tokens-matter">Why Tokens Matter</h2>
<p>A token is the atomic unit of processing for LLMs — not a word, not a character.</p>
<p>You pay per token · Context windows are measured in tokens · Token limits determine how much code the AI can &quot;see&quot;</p>
</section>

<h2 id="input-vs-output-pricing">Input vs. Output Pricing</h2>
<p><strong>Input tokens</strong> (prompt, code context, retrieved docs) cost <strong>less</strong> than <strong>output tokens</strong> (generated code and explanations).</p>
<p>Output is often <strong>5–8× more expensive</strong> — generation is more compute-intensive than reading.</p>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">prompt_tokens = <span class="hljs-number">5000</span>    <span class="hljs-comment"># instructions + context</span>

</code></pre>

<h2 id="the-cache-effect">The Cache Effect</h2>
<p>Models can cache frequently used content:</p>
<ul>
<li><strong>Cache Write:</strong> Cost to initially store</li>
<li><strong>Cache Read:</strong> <strong>Much cheaper</strong> than fresh input (80–95% savings)</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># First request  → pays full input price</span>
<span class="hljs-comment"># Second request → same context → pays cache read price</span>
</code></pre>
<p>Context discipline = cost discipline.</p>
</section>

<p><strong>Context engineering</strong> = knowing what to put in, what to leave out, and how to structure it.</p>

<header>Cursor Training Program — Complete Course</header>

<h2 id="context-checklist">Context Checklist</h2>
<p>Before every AI interaction, ask:</p>
<ul>
<li>What problem am I trying to solve?</li>
<li>What files/code does the model need to see?</li>
<li>What would a human need to know to help me?</li>
<li>What information can I safely leave out?</li>
<li>Is my context under the token limit?</li>
<li>Have I included relevant error messages?</li>
<li>Have I specified constraints (libraries, version, style)?</li>
</ul>
</section>

<h2 id="the-lost-in-the-middle-problem">The &quot;Lost in the Middle&quot; Problem</h2>
<p>Models pay <strong>most attention to the beginning and end</strong> of context, and <strong>less to the middle</strong>.</p>
<img src="assets/module-01/lost-in-middle.svg" alt="Lost in the middle attention chart" />
<p><strong>Implication:</strong> Put critical information at the beginning OR end, not the middle.</p>

<h2 id="mcp-model-context-protocol">MCP (Model Context Protocol)</h2>
<blockquote>
<p><em>&quot;USB-C for AI — one protocol that works across different tools.&quot;</em></p>
</blockquote>
<p><strong>Without MCP:</strong> Each tool needs custom integration</p>
<p><strong>With MCP:</strong> Tools advertise their capabilities; AI discovers them dynamically</p>
<img src="assets/module-01/mcp-architecture.svg" alt="MCP architecture" />
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-md" data-theme="flat-gaia" lang="en-US" class="fit-md" data-marpit-pagination="50" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-md;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="why-mcp-matters">Why MCP Matters</h2>
<table>
<thead>
<tr>
<th>Benefit</th>
<th>Explanation</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Interoperability</strong></td>
<td>Same tools work across different AI models</td>
</tr>
<tr>
<td><strong>Discoverability</strong></td>
<td>AI can learn what tools are available</td>
</tr>
<tr>
<td><strong>Standardization</strong></td>
<td>One protocol, not dozens of custom APIs</td>
</tr>
<tr>
<td><strong>Extensibility</strong></td>
<td>Add new tools without changing AI logic</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-theme="flat-gaia" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--header:Cursor Training Program — Complete Course;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>
<h2 id="tool-calling-best-practices">Tool Calling Best Practices</h2>
<ol>
<li><strong>Define clear tool schemas</strong> — name, description, parameters</li>
<li><strong>Validate tool calls</strong> before execution — allowlist + parameter checks</li>
<li><strong>Set timeouts</strong> — e.g., 30 seconds max per tool</li>
<li><strong>Log all tool calls</strong> — audit trail for debugging</li>
<li><strong>Require human approval</strong> for destructive actions — never auto-run writes/deletes</li>
</ol>
</section>

<h2 id="the-diff-review-workflow">The Diff Review Workflow</h2>
<ol>
<li>Ask agent to propose a change</li>
<li>Review the diff (what's added/removed)</li>
<li>Accept or reject changes</li>
<li>Test after acceptance</li>
</ol>
<blockquote>
<p><em>&quot;Before AI changes your code, see exactly what will change and approve it.&quot;</em></p>
</blockquote>
</section>

<h2 id="design-before-you-code">Design Before You Code</h2>
<p>Plan Mode makes the agent create a <strong>detailed plan BEFORE writing any code</strong>.</p>
<p><strong>When to use Plan Mode:</strong></p>
<ul>
<li>Changing multiple files · Adding a new feature</li>
<li>Refactoring existing code</li>
<li>You're not 100% sure of the best approach</li>
<li>The change is risky or hard to undo</li>
</ul>
</section>

<header>Cursor Training Program — Complete Course</header>

<h2 id="the-core-distinction">The Core Distinction</h2>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Ask Mode</th>
<th>Agent Mode</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Can read files</strong></td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Yes (with @mentions)</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Yes</td>
</tr>
<tr>
<td><strong>Can edit files</strong></td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> No</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Yes</td>
</tr>
<tr>
<td><strong>Can run terminal</strong></td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> No</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Yes</td>
</tr>
<tr>
<td><strong>Can browse web</strong></td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> No (limited)</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Yes (with tool)</td>
</tr>
<tr>
<td><strong>Can call tools</strong></td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> No</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Yes</td>
</tr>
<tr>

<td>Questions, learning, code review</td>
<td>Implementation, debugging, automation</td>
</tr>
</tbody>
</table>
</section>

<header>Cursor Training Program — Complete Course</header>

<h2 id="when-to-use-each-mode">When to Use Each Mode</h2>
<p><strong>USE ASK MODE when:</strong></p>
<ul>
<li>You have a question about code · Exploring a codebase</li>
<li>You want a second opinion on design</li>
<li>You're not ready to make changes · Production environment</li>
</ul>
<p><strong>USE AGENT MODE when:</strong></p>
<ul>
<li>You want the AI to write/change code</li>
<li>You need to run and react to commands</li>
<li>Multi-step tasks · Development environment</li>
<li>You're prepared to review changes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="130" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-md" data-theme="flat-gaia" lang="en-US" class="fit-md" data-marpit-pagination="130" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-md;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="safety-implications">Safety Implications</h2>
<table>
<thead>
<tr>
<th>Risk</th>
<th>Ask Mode</th>
<th>Agent Mode</th>
</tr>
</thead>
<tbody>
<tr>
<td>Unintended code changes</td>
<td>None</td>
<td>Moderate (requires review)</td>
</tr>
<tr>
<td>File deletion</td>
<td>None</td>
<td>Possible (needs approval)</td>
</tr>
<tr>
<td>Malicious commands</td>
<td>None</td>
<td>Possible (needs approval)</td>
</tr>
<tr>
<td>Data leakage</td>
<td>Low</td>
<td>Medium (can read files)</td>
</tr>
<tr>
<td>API cost</td>
<td>Low (no tool calls)</td>
<td>Higher (multiple tool calls)</td>
</tr>
</tbody>
</table>
</section>

<h2 id="windows-exercise-environment">Windows Exercise Environment</h2>
<p>All exercises in this module assume <strong>Windows 10/11</strong> with Cursor installed.</p>
<table>
<thead>
<tr>
<th>Terminal</th>
<th>Use when</th>
<th>Open in Cursor</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>PowerShell</strong></td>
<td>Default — Python, Git, <code>curl.exe</code>, npm, Cursor CLI (<code>agent</code>)</td>
<td><code>Ctrl+` </code> → <strong>PowerShell</strong></td>
</tr>
<tr>
<td><strong>Git Bash</strong></td>
<td>Bash syntax, <code>export VAR=...</code>, shell scripts ending in <code>.sh</code></td>
<td>Terminal menu → <strong>Git Bash</strong></td>
</tr>
<tr>
<td><strong>Command Prompt</strong></td>
<td>Legacy <code>.bat</code> files only</td>
<td>Terminal menu → <strong>Command Prompt</strong></td>
</tr>
<tr>
<td><strong>Ubuntu (WSL)</strong></td>
<td>Linux-only tools or native bash without Git Bash</td>
<td>Terminal menu → <strong>Ubuntu (WSL)</strong></td>
</tr>
</tbody>
</table>
<p><strong>Agent panel</strong> (<code>Ctrl+I</code>) is for prompts and tool use · <strong>Chat</strong> (<code>Ctrl+L</code>) is read-only Q&amp;A.</p>
<p><strong>Set default profile:</strong> Settings → <code>terminal.integrated.defaultProfile.windows</code> → <strong>PowerShell</strong></p>
</section>

<h2 id="anatomy-of-an-effective-prompt">Anatomy of an Effective Prompt</h2>
<ol>
<li><strong>ROLE / CONTEXT</strong> — &quot;You are a senior Python developer…&quot;</li>
<li><strong>TASK</strong> — &quot;Fix the bug in calculate_total()…&quot;</li>
<li><strong>CONSTRAINTS</strong> — &quot;Do not change the function signature…&quot;</li>
<li><strong>OUTPUT FORMAT</strong> — &quot;Show me the diff and explain your change…&quot;</li>
<li><strong>SUCCESS CRITERIA</strong> — &quot;Function should return 0 for empty input…&quot;</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="161" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-md" data-theme="flat-gaia" lang="en-US" class="fit-md" data-marpit-pagination="161" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-md;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="bad-prompts-vs-good-prompts">Bad Prompts vs. Good Prompts</h2>
<table>
<thead>
<tr>
<th>Bad Prompt</th>
<th>Good Prompt</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;Fix this code&quot;</td>
<td>&quot;Fix the IndexError in process_list() when list is empty. Do not change return type.&quot;</td>
</tr>
<tr>
<td><code>@calculator.c Fix divide</code></td>
<td><code>@calculator.c Improve divide() for division by zero. Change ONLY divide(). Show diff + cause.</code></td>
</tr>
<tr>
<td>&quot;Add logging&quot;</td>
<td>&quot;Add INFO-level logging to calculate() using existing logger config.&quot;</td>
</tr>
<tr>
<td>&quot;Make it faster&quot;</td>
<td>&quot;Optimize find_user() from O(n²) to O(n log n). Don't change signature.&quot;</td>
</tr>
<tr>
<td>&quot;Review my code&quot;</td>
<td>&quot;Review auth.py for SQL injection, password handling, session issues. Ignore style.&quot;</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="162" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-sm" data-theme="flat-gaia" lang="en-US" class="fit-sm" data-marpit-pagination="162" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-sm;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="the-boundaries-technique">The &quot;Boundaries&quot; Technique</h2>
<p>Always tell the agent what <strong>NOT</strong> to touch:</p>
<img src="assets/module-03/the-boundaries-technique.svg" alt="The &quot;Boundaries&quot; Technique" />
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="163" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-xs" data-theme="flat-gaia" lang="en-US" class="fit-xs" data-marpit-pagination="163" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-xs;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="avoiding-scope-creep">Avoiding Scope Creep</h2>
<p><strong>The problem:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>User: &quot;Fix the login bug.&quot;
Agent: &quot;Fixed login. Also refactored auth, added OAuth, reorganized codebase.&quot;
User: &quot;Wait, I just wanted the login bug fixed!&quot;
</code></pre>
<table>
<thead>
<tr>
<th>Technique</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Explicit boundaries</strong></td>
<td>&quot;Change ONLY login.js lines 42–56&quot;</td>
</tr>
<tr>
<td><strong>One thing at a time</strong></td>
<td>&quot;First, just identify the issue. Don't fix yet.&quot;</td>
</tr>
<tr>
<td><strong>Ask for plan first</strong></td>
<td>&quot;Plan Mode: Show me what you'll change before doing it&quot;</td>
</tr>
<tr>
<td><strong>Use checkpoints</strong></td>
<td>Create checkpoint before complex requests</td>
</tr>
<tr>
<td><strong>Prefer diffs</strong></td>
<td>&quot;Show me the diff, don't replace the whole file&quot;</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="164" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-theme="flat-gaia" lang="en-US" data-marpit-pagination="164" style="--paginate:true;--header:Cursor Training Program — Complete Course;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<p><strong>Before you start</strong></p>

<h2 id="exercise-34--step-1-constrained-prompt">Exercise 3.4 — Step 1: Constrained Prompt</h2>
<p><strong>Step 1 — Constrained prompt</strong></p>
<p><strong>Goal:</strong> Task + boundaries + output format + success criteria.</p>
<p><strong>Where:</strong> <strong>Agent panel</strong> — <code>Ctrl+I</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>@calculator.c

Task: Improve divide() so it handles division by zero safely inside the function itself.

Constraints:
- Do NOT change any function signatures
- Do NOT add new #include lines
- Do NOT modify main() or other functions
- Change ONLY the divide() function body

Output format: Show the exact diff and explain the root cause in 2–3 sentences.

Success criteria: divide(10, 0) returns safely; divide(10, 2) still returns 5.
</code></pre>
<p><strong>Look for:</strong> Diff limited to <code>divide()</code> — not a full refactor.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="166" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-theme="flat-gaia" lang="en-US" data-marpit-pagination="166" style="--paginate:true;--header:Cursor Training Program — Complete Course;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>
<h2 id="exercise-34--step-2-vague-vs-constrained">Exercise 3.4 — Step 2: Vague vs. Constrained</h2>
<p><strong>Step 2 — Vague vs. constrained</strong></p>
<p><strong>Goal:</strong> See why boundaries matter.</p>
<p><strong>Part A — vague</strong> (new message or <code>/clear</code>):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>@calculator.c Fix the divide function.
</code></pre>
<p>Note: Did the Agent change more than <code>divide()</code>?</p>
<p><strong>Part B — constrained:</strong> Re-send the <strong>Step 1</strong> prompt.</p>
<p><strong>Look for:</strong> Constrained prompt → smaller, reviewable diff.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="167" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-xs" data-theme="flat-gaia" lang="en-US" class="fit-xs" data-marpit-pagination="167" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-xs;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="exercise-34--step-3-plan-before-editing">Exercise 3.4 — Step 3: Plan Before Editing</h2>
<p><strong>Step 3 — Plan before editing</strong></p>
<p><strong>Goal:</strong> Approve a plan before any file changes.</p>
<p><strong>Where:</strong> Ask Mode (<code>/ask</code>) or Agent with <em>&quot;do not edit yet&quot;</em></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>@calculator.c

Before making any changes, answer:
1. What is the smallest change needed for divide()?
2. Which lines would you change?
3. What could go wrong?
4. What will you NOT change?

Do not edit files yet — I will review first.
</code></pre>
<p><strong>Look for:</strong> Written plan, <strong>no diff</strong> until you approve.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="168" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-xs" data-theme="flat-gaia" lang="en-US" class="fit-xs" data-marpit-pagination="168" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-xs;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="exercise-34--step-4-do-not-list">Exercise 3.4 — Step 4: DO NOT List</h2>
<p><strong>Step 4 — DO NOT list</strong></p>
<p><strong>Goal:</strong> Forbid scope creep explicitly.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>@calculator.c

Add a one-line comment above divide() explaining it performs integer division.

DO NOT:
- Change any function bodies
- Rename functions
- Add new functions
- Modify main()
</code></pre>
<p><strong>Look for:</strong> Comment only — no logic changes.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="169" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-sm" data-theme="flat-gaia" lang="en-US" class="fit-sm" data-marpit-pagination="169" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-sm;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="exercise-34--step-5-one-change-at-a-time">Exercise 3.4 — Step 5: One Change at a Time</h2>
<p><strong>Step 5 — One change at a time</strong></p>
<p><strong>Goal:</strong> Two messages — propose, then apply.</p>
<p><strong>Message 1:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>@calculator.c

Show me the validation you would add inside divide() for division by zero.
Do not edit the file yet.
</code></pre>
<p><strong>Message 2</strong> (after you review Message 1):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Now add only that validation to divide(). Show the diff before I accept.

<h2 id="what-are-rules">What Are Rules?</h2>
<p>Rules are Markdown files (<code>.cursor/rules/*.mdc</code>) with persistent instructions the agent automatically applies.</p>
<table>
<thead>
<tr>
<th>Rule Type</th>
<th>Scope</th>
<th>When Applied</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Global</strong></td>
<td>All projects</td>
<td>Always</td>
<td>&quot;Use American English spelling&quot;</td>
</tr>
<tr>
<td><strong>Project</strong></td>
<td>Specific repo</td>
<td>When opening that project</td>
<td>&quot;Run <code>make test</code> before suggesting changes&quot;</td>
</tr>
<tr>
<td><strong>File pattern</strong></td>
<td>Matching files</td>
<td>When editing those files</td>
<td>&quot;For <code>*.py</code> files, use type hints&quot;</td>
</tr>
<tr>
<td><strong>User</strong></td>
<td>Your account</td>
<td>Always across all projects</td>
<td>&quot;Explain like I'm a junior developer&quot;</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="179" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-theme="flat-gaia" lang="en-US" data-marpit-pagination="179" style="--paginate:true;--header:Cursor Training Program — Complete Course;--theme:flat-gaia;" data-marpit-pagination-total="431">

description: Brief description of what this rule does
globs: <span class="hljs-emphasis">*.py, src/<span class="hljs-strong">**/*.js

---

</span></span></code></pre>

<h2 id="what-is-mcp">What Is MCP?</h2>
<p>MCP standardizes how AI agents discover and use external tools — <strong>&quot;USB port for AI.&quot;</strong></p>
<img src="assets/module-04/what-is-mcp.svg" alt="What Is MCP?" />
<table>
<thead>
<tr>
<th>MCP Server</th>
<th>Capabilities</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>GitHub</strong></td>
<td>Create PRs, comment on issues, fetch reviews</td>
</tr>
<tr>
<td><strong>Slack</strong></td>
<td>Send messages, read channels</td>
</tr>
<tr>
<td><strong>Jira</strong></td>
<td>Create tickets, update status</td>
</tr>
<tr>
<td><strong>Database</strong></td>
<td>Query databases, run migrations</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="200" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-xs" data-theme="flat-gaia" lang="en-US" class="fit-xs" data-marpit-pagination="200" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-xs;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="hooks--slash-workflows">Hooks &amp; Slash Workflows</h2>
<p><strong>Hooks</strong> — scripts at specific agent workflow points:</p>
<table>
<thead>
<tr>
<th>Hook</th>
<th>When It Runs</th>
<th>Use Case</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>pre-tool-use</code></td>
<td>Before tool call</td>
<td>Validate permissions, log</td>
</tr>
<tr>
<td><code>post-tool-use</code></td>
<td>After tool returns</td>
<td>Transform results, audit</td>
</tr>
<tr>
<td><code>pre-prompt</code></td>
<td>Before sending to model</td>
<td>Inject context, redact secrets</td>
</tr>
<tr>
<td><code>post-response</code></td>
<td>After agent responds</td>
<td>Format output, log</td>
</tr>
</tbody>
</table>
<p><strong>Slash workflows</strong> — team commands combining MCP, hooks, and prompts:</p>
<table>
<thead>
<tr>
<th>Command</th>
<th>What It Does</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>/onboard @newdev</code></td>
<td>Onboarding skill + GitHub issue + Slack message</td>
</tr>
<tr>
<td><code>/deploy staging</code></td>
<td>Tests → build → deploy → notify team</td>
</tr>
<tr>
<td><code>/bug-report</code></td>
<td>Analyze error → create issue → assign on-call</td>
</tr>
</tbody>
</table>
</section>

<h2 id="what-are-subagents">What Are Subagents?</h2>
<p>Independent agent instances for specialized tasks — own context, tools, and instructions — then report back to the main agent.</p>
<img src="assets/module-04/what-are-subagents.svg" alt="What Are Subagents?" />
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="205" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-class="fit-md" data-theme="flat-gaia" lang="en-US" class="fit-md" data-marpit-pagination="205" style="--paginate:true;--header:Cursor Training Program — Complete Course;--class:fit-md;--theme:flat-gaia;" data-marpit-pagination-total="431">
<header>Cursor Training Program — Complete Course</header>

<h2 id="when-to-use-subagents">When to Use Subagents</h2>
<table>
<thead>
<tr>
<th>Scenario</th>
<th>Why Subagent</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Parallel work</strong></td>
<td>Multiple tasks simultaneously</td>
<td>Scan security AND generate docs</td>
</tr>
<tr>
<td><strong>Isolation</strong></td>
<td>Separate context</td>
<td>Analyze large file independently</td>
</tr>
<tr>
<td><strong>Specialization</strong></td>
<td>Different instructions</td>
<td>Security expert vs. UI designer</td>
</tr>
<tr>
<td><strong>Sandboxing</strong></td>
<td>Limit tool access</td>
<td>Read-only subagent for unknown code</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="206" data-paginate="true" data-header="Cursor Training Program — Complete Course" data-theme="flat-gaia" lang="en-US" data-marpit-pagination="206" style="--paginate:true;--header:Cursor Training Program — Complete Course;--theme:flat-gaia;" data-marpit-pagination-total="431">

<p>Create <code>bin/ai-review.sh</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-meta">#!/bin/bash</span>

security issues, missing error handling. Be concise.&quot;</span>
</code></pre>
<p><strong>PowerShell (Windows):</strong> Same steps in <strong>PowerShell</strong> — use <code>$env:NAME = &quot;value&quot;</code> instead of <code>export</code>, and <code>curl.exe</code> instead of <code>curl</code>.</p>

<h2 id="what-is-cloud-handoff">What Is Cloud Handoff?</h2>
<p>Send a local conversation to a Cloud Agent:</p>
<ul>
<li>Continue from web or mobile (<code>cursor.com/agents</code>)</li>
<li>Let the agent run long tasks while you're away</li>
<li>Resume the session later from any device</li>
</ul>

<h2 id="exercise-62--api-access">Exercise 6.2 — API Access</h2>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># List artifacts</span>
curl -s -u <span class="hljs-string">&quot;<span class="hljs-variable">$CURSOR_USER_API_KEY</span>:&quot;</span> \
  <span class="hljs-string">&quot;https://api.cursor.com/v1/agents/<span class="hljs-variable">$AGENT_ID</span>/artifacts&quot;</span> | jq <span class="hljs-string">&#x27;.&#x27;</span>

<span class="hljs-comment"># Download specific artifact</span>
DOWNLOAD_URL=$(curl -s -u <span class="hljs-string">&quot;<span class="hljs-variable">$CURSOR_USER_API_KEY</span>:&quot;</span> \
  <span class="hljs-string">&quot;.../artifacts/download?path=artifacts/report.md&quot;</span> | jq -r <span class="hljs-string">&#x27;.url&#x27;</span>)
curl -L -o report.md <span class="hljs-string">&quot;<span class="hljs-variable">$DOWNLOAD_URL</span>&quot;</span>
</code></pre>
<p><strong>PowerShell (Windows):</strong> Same steps in <strong>PowerShell</strong> — use <code>$env:NAME = &quot;value&quot;</code> instead of <code>export</code>, and <code>curl.exe</code> instead of <code>curl</code>.</p>
<p>Create <code>bin/process-artifacts.sh</code> to batch-download all artifacts for an agent ID.</p>

<h2 id="security-best-practices">Security Best Practices</h2>
<ul>
<li>Never commit API keys to git</li>
<li>Use environment variables or secret managers</li>
<li>Rotate keys periodically (every 90 days)</li>
<li>Use different keys for dev and production</li>
<li>Revoke unused keys immediately</li>
<li>Use Admin API keys only when necessary</li>
<li>Monitor key usage in dashboard</li>
</ul>
</section>

<h2 id="exercise-73--exponential-backoff">Exercise 7.3 — Exponential Backoff</h2>
<p><strong>Platform:</strong> Windows 10/11 · <strong>PowerShell</strong> for API · <code>$env:VAR</code> · <code>curl.exe</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">call_with_retry</span>(<span class="hljs-params">url, max_retries=<span class="hljs-number">5</span>, base_delay=<span class="hljs-number">1.0</span></span>):
    <span class="hljs-keyword">for</span> attempt <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(max_retries):
        response = requests.get(url, auth=AUTH)
        <span class="hljs-keyword">if</span> response.status_code == <span class="hljs-number">200</span>:
            <span class="hljs-keyword">return</span> response.json()
        <span class="hljs-keyword">if</span> <span class="hljs-number">400</span> &lt;= response.status_code &lt; <span class="hljs-number">500</span>:
            <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>  <span class="hljs-comment"># Don&#x27;t retry client errors</span>
        <span class="hljs-keyword">if</span> response.status_code <span class="hljs-keyword">in</span> [<span class="hljs-number">429</span>, <span class="hljs-number">500</span>, <span class="hljs-number">502</span>, <span class="hljs-number">503</span>, <span class="hljs-number">504</span>]:
            delay = <span class="hljs-built_in">int</span>(response.headers.get(<span class="hljs-string">&#x27;Retry-After&#x27;</span>,
                      <span class="hljs-built_in">min</span>(base_delay * (<span class="hljs-number">2</span> ** attempt), <span class="hljs-number">60</span>)))
            time.sleep(delay)
    <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>
</code></pre>
</section>

<h2 id="what-are-etags">What Are ETags?</h2>
<p>ETags are unique identifiers for API response versions.</p>
<ol>
<li>Send <code>If-None-Match</code> header with previous ETag</li>
<li>Server returns <code>304 Not Modified</code> if unchanged</li>
<li>No data transfer, no rate limit consumption</li>
</ol>
</section>

<h2 id="exercise-74--basic-etag-usage">Exercise 7.4 — Basic ETag Usage</h2>
<p><strong>Platform:</strong> Windows 10/11 · <strong>PowerShell</strong> for API · <code>$env:VAR</code> · <code>curl.exe</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">get_with_etag</span>(<span class="hljs-params">url, previous_etag=<span class="hljs-literal">None</span></span>):
    headers = {<span class="hljs-string">&#x27;If-None-Match&#x27;</span>: previous_etag} <span class="hljs-keyword">if</span> previous_etag <span class="hljs-keyword">else</span> {}
    response = requests.get(url, auth=AUTH, headers=headers)

    <span class="hljs-keyword">if</span> response.status_code == <span class="hljs-number">304</span>:
        <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>, response.headers.get(<span class="hljs-string">&#x27;ETag&#x27;</span>)  <span class="hljs-comment"># Use cached data</span>
    <span class="hljs-keyword">if</span> response.status_code == <span class="hljs-number">200</span>:
        <span class="hljs-keyword">return</span> response.json(), response.headers.get(<span class="hljs-string">&#x27;ETag&#x27;</span>)
</code></pre>
</section>

<h2 id="exercise-74--etagcache--cachedclient">Exercise 7.4 — ETagCache &amp; CachedClient</h2>
<p><strong>Demonstration (Windows):</strong> <strong>PowerShell</strong> terminal (<code>Ctrl+` </code>) · Agent panel <code>Ctrl+I</code> · shortcuts use <strong>Ctrl</strong></p>
<p><strong>ETagCache:</strong> persistent pickle-based cache keyed by URL hash</p>
<p><strong>CachedCursorClient:</strong></p>
<ul>
<li>Check local cache → send <code>If-None-Match</code></li>
<li>On 304 → return cached data (Cache HIT)</li>
<li>On 200 → update cache (Cache MISS)</li>
</ul>
<p><strong>Batch analytics:</strong> fetch 30 days of usage — unchanged days return 304 instantly</p>
<p><strong>Success Criteria:</strong> Basic ETag request · persistent cache · analytics workload caching</p>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">stream_agent_response</span>(<span class="hljs-params">agent_id, run_id, on_event=<span class="hljs-literal">None</span></span>):
    url = <span class="hljs-string">f&quot;<span class="hljs-subst">{BASE_URL}</span>/agents/<span class="hljs-subst">{agent_id}</span>/runs/<span class="hljs-subst">{run_id}</span>/stream&quot;</span>

        <span class="hljs-keyword">elif</span> line.startswith(<span class="hljs-string">b&#x27;data:&#x27;</span>):
            data = json.loads(line[<span class="hljs-number">5</span>:].strip())

                on_event(current_event, data)
</code></pre>

<h2 id="exercise-84--hmac-verification">Exercise 8.4 — HMAC Verification</h2>
<p><strong>Platform:</strong> Windows 10/11 · <strong>PowerShell</strong> for API · <code>$env:VAR</code> · <code>curl.exe</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">verify_signature</span>(<span class="hljs-params">raw_body, signature_header</span>):
    received = signature_header[<span class="hljs-number">7</span>:]  <span class="hljs-comment"># strip &quot;sha256=&quot;</span>
    expected = hmac.new(
        WEBHOOK_SECRET.encode(), raw_body, hashlib.sha256
    ).hexdigest()
    <span class="hljs-keyword">return</span> hmac.compare_digest(expected, received)
</code></pre>
<p>Flask route: verify signature → parse payload → handle FINISHED/ERROR</p>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">anonymize_email</span>(<span class="hljs-params">email</span>):
    local = email.split(<span class="hljs-string">&#x27;@&#x27;</span>)[<span class="hljs-number">0</span>]
    <span class="hljs-keyword">return</span> local[:<span class="hljs-number">2</span>] + <span class="hljs-string">&quot;...&quot;</span> + local[-<span class="hljs-number">2</span>:]
</code></pre>

<h2 id="exercise-103--query-events">Exercise 10.3 — Query Events</h2>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">curl -s -u <span class="hljs-string">&quot;<span class="hljs-variable">$CURSOR_ADMIN_API_KEY</span>:&quot;</span> \

  | jq <span class="hljs-string">&#x27;.events[] | {user: .user.email, file: .filePath, model: .modelId, accepted: .accepted}&#x27;</span>
</code></pre>
